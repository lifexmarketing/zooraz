name: Build Release Zip

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: zip -r zooraz.zip zooraz/

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: zooraz.zip
